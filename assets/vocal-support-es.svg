<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Del aire al sonido</title>
  <desc id="desc">Infografia vertical que explica el recorrido del aire desde los pulmones hasta la laringe y los resonadores.</desc>
  <rect width="900" height="1200" fill="#ede5d0"/>
  <rect x="56" y="56" width="788" height="1088" rx="36" fill="#f7f1e8" stroke="#c8973a" stroke-width="4"/>

  <g font-family="Georgia, serif">
    <text x="450" y="124" text-anchor="middle" font-size="24" letter-spacing="5" fill="#7a1f2e">DEL AIRE AL SONIDO</text>
    <text x="450" y="166" text-anchor="middle" font-size="40" fill="#18120a">Apoyo, fonacion y resonancia</text>
  </g>

  <g stroke="#6b5540" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M450 300V350"/>
    <path d="M450 620V670"/>
  </g>
  <g fill="#c8973a">
    <polygon points="450,386 424,338 476,338"/>
    <polygon points="450,706 424,658 476,658"/>
  </g>

  <g font-family="Georgia, serif">
    <rect x="96" y="208" width="708" height="164" rx="28" fill="#fbf7f1" stroke="#c8973a" stroke-width="3"/>
    <circle cx="174" cy="290" r="34" fill="#7a1f2e"/>
    <text x="174" y="301" text-anchor="middle" font-size="32" fill="#f7f1e8">1</text>
    <text x="252" y="276" font-size="31" fill="#18120a">Pulmones y apoyo</text>
    <text x="252" y="314" font-size="22" fill="#6b5540">El aire se toma, se reserva y se administra.</text>
    <g transform="translate(610 238) scale(0.82)">
      <ellipse cx="68" cy="72" rx="42" ry="68" fill="#cfaa95" stroke="#7a1f2e" stroke-width="4"/>
      <ellipse cx="142" cy="72" rx="42" ry="68" fill="#cfaa95" stroke="#7a1f2e" stroke-width="4"/>
      <path d="M40 126C74 94 104 80 136 80C168 80 198 94 230 126" fill="none" stroke="#7a1f2e" stroke-width="16" stroke-linecap="round"/>
      <path d="M105 22V164" fill="none" stroke="#6b5540" stroke-width="8" stroke-linecap="round"/>
      <path d="M105 -4V34" fill="none" stroke="#c8973a" stroke-width="14" stroke-linecap="round"/>
      <polygon points="105,52 86,20 124,20" fill="#c8973a"/>
    </g>
  </g>

  <g font-family="Georgia, serif">
    <rect x="96" y="418" width="708" height="192" rx="28" fill="#fbf7f1" stroke="#c8973a" stroke-width="3"/>
    <circle cx="174" cy="514" r="34" fill="#7a1f2e"/>
    <text x="174" y="525" text-anchor="middle" font-size="32" fill="#f7f1e8">2</text>
    <text x="252" y="494" font-size="31" fill="#18120a">Laringe y pliegues</text>
    <text x="252" y="532" font-size="22" fill="#6b5540">El aire asciende y hace vibrar la glotis.</text>
    <g transform="translate(650 450) scale(0.72)">
      <path d="M92 18C120 18 142 42 142 74V126C142 176 120 220 92 252C64 220 42 176 42 126V74C42 42 64 18 92 18Z" fill="#ddccb8" stroke="#3b2e1a" stroke-width="5"/>
      <path d="M76 110C80 92 86 76 92 62C98 76 104 92 108 110V164C108 186 100 204 92 218C84 204 76 186 76 164Z" fill="#f7f1e8" stroke="#7a1f2e" stroke-width="4"/>
      <path d="M58 122C70 108 80 102 90 102" fill="none" stroke="#a33040" stroke-width="10" stroke-linecap="round"/>
      <path d="M126 122C114 108 104 102 94 102" fill="none" stroke="#a33040" stroke-width="10" stroke-linecap="round"/>
      <circle cx="92" cy="146" r="18" fill="#c8973a"/>
      <rect x="158" y="74" width="120" height="64" rx="16" fill="#f5f0e8" stroke="#c8973a" stroke-width="3"/>
      <text x="218" y="112" text-anchor="middle" font-size="22" fill="#18120a">vibracion</text>
      <path d="M162 106H132" fill="none" stroke="#7a1f2e" stroke-width="4"/>
      <polygon points="132,106 146,96 146,116" fill="#7a1f2e"/>
    </g>
  </g>

  <g font-family="Georgia, serif">
    <rect x="96" y="656" width="708" height="262" rx="28" fill="#fbf7f1" stroke="#c8973a" stroke-width="3"/>
    <circle cx="174" cy="786" r="34" fill="#7a1f2e"/>
    <text x="174" y="797" text-anchor="middle" font-size="32" fill="#f7f1e8">3</text>
    <text x="252" y="764" font-size="31" fill="#18120a">Resonadores</text>
    <text x="252" y="802" font-size="22" fill="#6b5540">Boca, faringe y cavidad nasal amplifican.</text>
    <g transform="translate(622 690) scale(0.7)">
      <path d="M84 36C138 36 182 76 182 130C182 164 164 196 134 214L138 252H110L96 220H68C38 220 16 194 16 164V102C16 64 46 36 84 36Z" fill="#e8dbc5" stroke="#3b2e1a" stroke-width="5"/>
      <path d="M92 92C106 84 126 84 142 94" fill="none" stroke="#7a1f2e" stroke-width="6" stroke-linecap="round"/>
      <path d="M88 122C110 114 138 116 156 130" fill="none" stroke="#7a1f2e" stroke-width="6" stroke-linecap="round"/>
      <path d="M96 154C122 152 150 160 168 176" fill="none" stroke="#7a1f2e" stroke-width="6" stroke-linecap="round"/>
      <g fill="none" stroke="#c8973a" stroke-width="8" stroke-linecap="round">
        <path d="M202 96C234 84 264 86 298 100"/>
        <path d="M198 132C236 120 268 124 308 140"/>
        <path d="M194 170C230 162 262 166 294 182"/>
      </g>
      <rect x="8" y="250" width="250" height="70" rx="16" fill="#f5f0e8" stroke="#c8973a" stroke-width="3"/>
      <text x="133" y="280" text-anchor="middle" font-size="22" fill="#18120a">sonido mas claro</text>
      <text x="133" y="306" text-anchor="middle" font-size="22" fill="#18120a">y proyectado</text>
    </g>
  </g>

  <g font-family="Georgia, serif">
    <rect x="114" y="952" width="672" height="96" rx="22" fill="#f5eddc" stroke="#c8973a" stroke-width="3"/>
    <text x="450" y="994" text-anchor="middle" font-size="27" fill="#7a1f2e">Sin aire organizado no hay vibracion estable ni sonido libre.</text>
    <text x="450" y="1027" text-anchor="middle" font-size="22" fill="#6b5540">La respiracion no solo inicia la voz: tambien la sostiene.</text>
  </g>
</svg>
